# GitHub Actions should be updated using actions-up so we can use a cooldown
# and lock to deterministic versions (exception: security updates, which Dependabot
# will try to pull in):
#
# bun run update:actions

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # The portable verification core (install, engines, lint, typecheck,
        # depcheck, audit gate, unit tests, build, license check) runs on both
        # Windows and Linux. The display/browser/VS-Code-provisioning-heavy steps
        # (Playwright, CDP, extension e2e) run on Linux only — they depend on
        # xvfb, apt, and a linux-x64 VS Code download. Those suites still RUN on
        # Windows locally via `bun run test:playwright` / `test:cdp` / `test:e2e`
        # (all cross-platform now), they are just not gated in CI here.
        os: [ubuntu-24.04, windows-latest]
        node-version: [22] # Match mise.toml

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          experimental: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check engine version compatibility
        run: bun run check:engines

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Dependency check
        run: bun run depcheck

      # Reviewed-baseline vulnerability gate (TASK-100). Fails only on advisories
      # that are NOT in security/audit-allowlist.json at/above its threshold, or
      # on expired allowlist exceptions — so new upstream advisories force a human
      # review instead of silently rotting, and the build stays deterministic
      # against unreviewed advisory churn. See security/dependency-audit.md.
      - name: Dependency audit gate
        run: bun run audit:gate

      - name: Unit tests
        run: bun run test

      - name: Build
        run: bun run build

      - name: Verify licenses are up to date
        run: bun run licenses:check

      # ---- Linux-only display/browser/VS-Code suites ------------------------

      - name: Get Playwright version
        if: runner.os == 'Linux'
        id: playwright-version
        run: echo "version=$(bunx playwright --version | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        if: runner.os == 'Linux'
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browser
        if: runner.os == 'Linux' && steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright system deps only
        if: runner.os == 'Linux' && steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Playwright tests
        if: runner.os == 'Linux'
        run: bun run test:playwright

      - name: Download VS Code for CDP tests
        if: runner.os == 'Linux'
        run: |
          mkdir -p .vscode-test
          curl -fsSL "https://update.code.visualstudio.com/latest/linux-x64/stable" -o /tmp/vscode.tar.gz
          tar -xzf /tmp/vscode.tar.gz -C .vscode-test
          rm /tmp/vscode.tar.gz

      - name: CDP cross-view tests
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y xvfb
          xvfb-run -a --server-args="-screen 0 1920x1080x24" \
            bunx vitest run --config vitest.cdp.config.ts

      - name: Extension e2e smoke tests
        if: runner.os == 'Linux'
        run: bun run test:e2e
